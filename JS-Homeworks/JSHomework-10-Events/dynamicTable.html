<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Table</title>
    <style>
      table {
        width: 100%;
        font-family: Arial, sans-serif;
        font-size: 20px;
        margin-top: 20px;
      }
      td {
        border: 5px solid pink;
        padding: 15px;
        text-align: center;
        color: blue;
      }
    </style>
  </head>
  <body>
    <div>
      <label for="rows">Number of Rows:</label>
      <input type="number" id="rows" value="0" />
      <label for="cols">Number of Columns:</label>
      <input type="number" id="cols" value="0" />
      <input type="button" id="btnGenerate" value="Generate table" />
    </div>
    <div id="table"></div>
    <script src="scripts/dynamicTable.js"></script>
  </body>
</html>
