<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Flexbox</title>
  </head>
  <body>
    <div class="container">
      <div class="horizontal-row">
        <div class="hr-box-1"></div>
        <div class="hr-box-2"></div>
        <div class="hr-box-3"></div>
      </div>

      <div class="vertical-row">
        <div class="vr-box-1"></div>
        <div class="vr-box-2"></div>
        <div class="vr-box-3"></div>
      </div>
      <div class="middle">
        <div class="middle-top-row">
          <div class="mr-t-box-1"></div>
          <div class="mr-t-box-2"></div>
          <div class="middle-top-row-1">
            <div class="mr-t-box-3"></div>
            <div class="mr-t-box-4"></div>
          </div>
        </div>

        <div class="middle-bottom-row">
          <div class="middle-bottom-row-1">
            <div class="mr-b-box-1"></div>
            <div class="mr-b-box-2"></div>
          </div>
          <div class="middle-bottom-row-2">
            <div class="mr-b-box-3"></div>
            <div class="mr-b-box-4"></div>
            <div class="mr-b-box-5"></div>
            <div class="mr-b-box-6"></div>
            <div class="mr-b-box-7"></div>
          </div>
          <div class="mr-b-box-8"></div>
        </div>
      </div>
      <div class="vertical-row-right">
        <div class="vr-r-box-1"></div>
        <div class="vr-r-box-2"></div>
      </div>
    </div>
  </body>
</html>
