<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table Homework</title>
    <style>
      td {
        width: 50px;
        height: 50px;
      }
      .red {
        background-color: red;
      }
      .yellow {
        background-color: yellow;
      }
      .blue {
        background-color: blue;
      }
      .green {
        background-color: green;
      }
      .lightblue {
        background-color: lightblue;
      }
      .circle {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 3px solid black;
        display: block;
        margin: 0 auto;
      }
      .center-text {
        text-align: center;
        margin-bottom: 0;
        margin-top: 11px;
      }
    </style>
  </head>
  <body>
    <h1>HTML Homework #3-Table</h1>

    <table border="5">
      <tr>
        <td class="red"></td>
        <td class="red"></td>
        <td colspan="2" rowspan="2"></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="lightblue">
          <span class="circle"
            ><p class="center-text"><b>Start</b></p></span
          >
        </td>
        <td rowspan="2" colspan="2"></td>
        <td class="blue"></td>
        <td class="blue"></td>
      </tr>
      <tr>
        <td class="red"></td>
        <td class="red"></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="blue"></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="blue"></td>
        <td class="blue"></td>
      </tr>
      <tr>
        <td rowspan="2" colspan="4"></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="blue"></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td rowspan="2" colspan="4"></td>
      </tr>
      <tr>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="blue"></td>
        <td class="lightblue"><span class="circle"></span></td>
      </tr>
      <tr>
        <td class="lightblue">
          <span class="circle"
            ><p class="center-text"><b>Start</b></p></span
          >
        </td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="blue"></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="lightblue"><span class="circle"></span></td>
      </tr>
      <tr>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="red"></td>
        <td class="red"></td>
        <td class="red"></td>
        <td class="red"></td>
        <td></td>
        <td class="green"></td>
        <td class="green"></td>
        <td class="green"></td>
        <td class="green"></td>
        <td class="lightblue"><span class="circle"></span></td>
      </tr>
      <tr>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="yellow"></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="lightblue">
          <span class="circle"
            ><p class="center-text"><b>Start</b></p></span
          >
        </td>
      </tr>
      <tr>
        <td rowspan="2" colspan="4"></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="yellow"></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td colspan="4" rowspan="2"></td>
      </tr>
      <tr>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="yellow"></td>
        <td class="lightblue"><span class="circle"></span></td>
      </tr>
      <tr>
        <td class="yellow"></td>
        <td class="yellow"></td>
        <td rowspan="2" colspan="2"></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="yellow"></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td rowspan="2" colspan="2"></td>
        <td class="green"></td>
        <td class="green"></td>
      </tr>
      <tr>
        <td class="yellow"></td>
        <td class="yellow"></td>
        <td class="lightblue">
          <span class="circle"
            ><p class="center-text"><b>Start</b></p></span
          >
        </td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="lightblue"><span class="circle"></span></td>
        <td class="green"></td>
        <td class="green"></td>
      </tr>
    </table>
  </body>
</html>
